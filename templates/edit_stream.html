{% extends "base.html" %}

{% block title %}Edit Stream - Catio.cam{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Edit Stream</h1>
        <p>Update your stream details. Editing will reset the stream to pending review.</p>

        <div class="form-group">
            <label>Platform</label>
            <p class="form-static">{{ stream.platform }}</p>
        </div>

        <div class="form-group">
            <label>Channel URL</label>
            <p class="form-static">{{ stream.channel_url }}</p>
        </div>

        <form method="post" action="/stream/{{ stream.id }}/edit">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="title">Stream Title</label>
                <input type="text" id="title" name="title" required maxlength="100"
                       value="{{ stream.title }}">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" maxlength="500">{{ stream.description or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" maxlength="100"
                       value="{{ stream.location or '' }}">
            </div>

            <div class="form-group">
                <label for="tags">Tags</label>
                <input type="text" id="tags" name="tags" maxlength="200"
                       value="{{ stream.tags or '' }}">
                <small>Comma-separated tags</small>
            </div>

            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="/my-streams" class="btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
